name: afya_flow_mobile
description: Afya Flow Healthcare Platform Mobile Client
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management & DI
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0

  # Networking & Auth
  dio: ^5.4.0
  jwt_decoder: ^2.0.1
  shared_preferences: ^2.2.3

  # Utility
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
